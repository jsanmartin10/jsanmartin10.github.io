name: Actualizar Datos ONPE

on:
  schedule:
    - cron: '0 * * * *' # Ejecuta en el minuto 0 de cada hora
  workflow_dispatch: # Permite ejecutarlo manualmente desde la pestaña Actions

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Ejecutar script de actualización
      run: python update_onpe.py

    - name: Commit y Push de datos nuevos
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add onpe_data.json
        # Intentará hacer commit. Si no hay cambios en el archivo, se saltará el error y continuará
        git commit -m "Auto-update: Datos ONPE actualizados" || echo "No hay cambios para commitear"
        git push
